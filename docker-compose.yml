
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasktracker-network

  backend-service:
    build: ./backend
    container_name: backend-container
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - tasktracker-network


  frontend-service: 
    build: ./frontend
    container_name: frontend-container
    ports:
      - "80:80"
    depends_on:
      - backend-service
    networks:
      - tasktracker-network
    restart: unless-stopped

volumes:
  postgres_data: 

networks:
  tasktracker-network:
    driver: bridge
