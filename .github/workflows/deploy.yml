name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev-docker
      - dev-k8s

jobs:
  build-and-deploy:
    
    runs-on: self-hosted
    
    steps:
      # Step 1: Download the newly pushed code to your laptop's runner folder
      - name: Checkout Code
        uses: actions/checkout@v4
        
      
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-v${{ github.run_number }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-v${{ github.run_number }}

      
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-v${{ github.run_number }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-v${{ github.run_number }}

      - name: Deploy to Minikube
        run: |

          kubectl apply -f k8s/
          
          kubectl set image deployment/backend-deployment backend=${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-v${{ github.run_number }}
          kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-v${{ github.run_number }}

      # AUTOMATED SMOKE TEST
      # Instantly verify if the deployment successfully brought the system online
      - name: Run Smoke Test
        run: ./scripts/smoke_test.sh




